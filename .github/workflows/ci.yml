name: ci
on:
  workflow_dispatch:

jobs:

  plugin-test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        eslint-version: [4, 5, 6, 7, 8]
    name: Plugin test eslint v${{ matrix.eslint-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node -v
      - run: npm -v
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Install specific eslint version
        run: npm install eslint@${{ matrix.eslint-version }} --legacy-peer-deps
      - name: Test
        run: npm test
